name: Tests (End-to-end)

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - '**'

jobs:
  tests-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install local dependencies
        run: npm ci

      - name: Install global dependencies
        run: npm install --global bee-dev

      - name: Run bee-dev
        run: bee-dev --port 1633 &

      - name: Tests
        run: npm run test.e2e


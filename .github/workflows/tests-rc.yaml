name: Tests (Bee RC)

on:
  push:
    branches:
      - 'master'
  pull_request:
    branches:
      - '**'

env:
  BEE_API_URL: 'http://localhost:1633'
  BEE_PEER_API_URL: 'http://localhost:11633'

jobs:
  tests-bee-rc:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install local dependencies
        run: npm ci

      - name: Install global dependencies
        run: npm install --global bee-dev etherhive@1.1.0 @ethersphere/swarm-cli npxie

      - name: Run bee-dev
        run: bee-dev --port 16337 &

      - name: Run bee-dev with --no-swap
        run: bee-dev --port 16338 --no-swap &

      - name: Start etherhive environment
        run: etherhive start --tag master

      - name: Deposit to chequebook
        run: |
          swarm-cli cheque deposit 10
          swarm-cli cheque deposit 10 --bee-api-url http://localhost:11633
          swarm-cli cheque deposit 10 --bee-api-url http://localhost:21633
          swarm-cli cheque deposit 10 --bee-api-url http://localhost:31633
          swarm-cli cheque deposit 10 --bee-api-url http://localhost:41633

      - name: Print swarm-cli status
        continue-on-error: true
        run: swarm-cli status

      - name: Tests
        run: npm run test

      - name: Teardown
        run: etherhive stop
